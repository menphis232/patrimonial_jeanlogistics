<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow theme-card">
      <mat-card-content class="b-t-1">
        <form [formGroup]="medicalEventForm" #incidentForm="ngForm">
          <div class="row">
            <div class="col-12 mt-4">
              <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-8">Fotos / Evidencias</mat-label>
              <p class="mat-body-2 text-muted m-b-16">Puede agregar varias fotos. Todas compartirán el mismo comentario general.</p>
              <app-dropzone formControlName="files" [deleteOnlyLocal]="true" class="w-100"></app-dropzone>
            </div>
            <div class="col-12 mt-3">
              <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-8">Comentario general (para todas las fotos)</mat-label>
              <mat-form-field appearance="outline" class="w-100">
                <textarea matInput formControlName="files_comment" rows="3" placeholder="Descripción o comentario que aplica a todas las fotos subidas..."></textarea>
              </mat-form-field>
            </div>
          </div>

          <div class="d-flex justify-content-end mt-4">
            <button mat-stroked-button color="warn" class="m-r-8" [routerLink]="['/incident']"> Cancelar </button>
            <button mat-flat-button color="primary" (click)="save()"> Guardar </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
