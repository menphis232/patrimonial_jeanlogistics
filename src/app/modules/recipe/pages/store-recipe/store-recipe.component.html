<div class="row">
    <div class="col-lg-12">
        <mat-card class="cardWithShadow theme-card">
            <mat-card-content class="b-t-1">
                <form [formGroup]="form" #projectNgForm="ngForm">
                    <div class="row">

                        <div class="col-sm-12 col-md-12">
                            <ng-container formArrayName="prescription_articles">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Asignar medicamentos disponibles en inventario</mat-label>
                           
                            <div class="row w-100 mt-3">
                                <ng-container  *ngFor="let item of injuryInForm?.controls; index as Idx" [formGroupName]="Idx">
                                  <div class="col-sm-12 col-md-4">
                                    <div class="form-group">
                                       
                                        <div class="input-group mb-3">
                                            <app-c-async-select formControlName="stock_id" methodService="stocks"
                                            bindLabel="description" bindValue="id">
                                        </app-c-async-select>

                                        <mat-form-field  appearance="outline" class="w-100">
                                            <input matInput formControlName="quantity" placeholder="Cantidad" />
                                          </mat-form-field>
                                
                                          <mat-form-field  appearance="outline" class="w-100">
                                            <input matInput formControlName="description" placeholder="Descripción" />
                                          </mat-form-field>
                                          <button mat-icon-button color="warn" (click)="removeInjuryByIndex(Idx)" >
                                            <mat-icon>delete</mat-icon>
                                          </button>
                                        </div>
                                      </div>
                                  </div>
                                </ng-container>
                                
                              </div>
                              <button mat-icon-button color="primary" (click)="addInjury()" >
                                <mat-icon>add</mat-icon>
                              </button>
                            </ng-container>
                        </div>

                  
                        <div class="col-sm-1 col-md-4 m-t-10">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Observaciones</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="observations" matInput placeholder="" />
                                <mat-error errorSpan controlName="observations"></mat-error>
                            </mat-form-field>
                        </div>

                    </div>
                    <div class="d-flex justify-content-end">
                        
                        <button mat-flat-button color="primary" (click)="save()">
                            <div class="d-flex align-items-center">
                                <i-tabler 
                                name="device-floppy" 
                                class="icon-18 m-r-4"></i-tabler>
                                <span>Guardar</span>
                            </div>
                        </button>
                      
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
