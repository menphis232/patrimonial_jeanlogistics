<div class="row">
    <div class="col-lg-12">
        <mat-card class="cardWithShadow">
            <mat-card-content>
                <!-- Toolbar -->
                <div class="row justify-content-between align-items-center m-b-12">
                    <div class="col-sm-6 col-md-4">
                        <app-search-field [pagination]="pagination" class="search-field-custom"></app-search-field>
                    </div>
                    <div class="col-sm-6 col-md-8 d-flex justify-content-end">
                        <button mat-flat-button color="primary" class="new-eval-btn" [routerLink]="['/movements/add-vulnerability']">
                            <mat-icon>add</mat-icon>
                            Nueva Eval Vulnerabilidad
                        </button>
                    </div>
                </div>

                <!-- Filtros -->
                <form [formGroup]="form" #projectNgForm="ngForm">
                    <div class="row">
                        <div class="col-sm-6 col-md-6">
                            <app-c-async-select
                                formControlName="farm"
                                methodService="costCenters"
                                bindLabel="name"
                                bindValue="id"
                                class="custom-select">
                            </app-c-async-select>
                        </div>
                        <div class="col-sm-3 col-md-3">
                            <mat-form-field appearance="outline" class="w-100 custom-year-select">
                                <mat-label>Año</mat-label>
                                <mat-select formControlName="year">
                                    <mat-option *ngFor="let y of availableYears" [value]="y">{{ y }}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-3 col-md-3">
                            <button mat-raised-button color="primary" type="button"
                                class="w-100 report-download-btn"
                                [disabled]="!form.get('farm')?.value || !form.get('year')?.value"
                                (click)="downloadReport()">
                                <mat-icon>cloud_download</mat-icon>
                                Descargar Reporte
                            </button>
                        </div>
                    </div>
                </form>
            </mat-card-content>
        </mat-card>

        <!-- Tabla -->
        <mat-card class="cardWithShadow table-container">
            <ng-container *ngIf="(categories$ | async) as patients">
                <ng-container *ngIf="patients.length > 0;">
                    <div class="table-responsive custom-table">
                        <table mat-table [dataSource]="patients" matSort class="w-100">

                            <ng-container matColumnDef="date">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                                    <span class="header-cell">Fecha de evaluación</span>
                                </th>
                                <td mat-cell *matCellDef="let element">
                                    <span class="badge bg-light-primary text-primary">{{ element.date_evaluation | date:'yyyy-MM-dd' }}</span>
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="farm">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                                    <span class="header-cell">Granja</span>
                                </th>
                                <td mat-cell *matCellDef="let element">
                                    <strong>{{ element.farm?.name }}</strong>
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="create_by">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                                    <span class="header-cell">Responsable</span>
                                </th>
                                <td mat-cell *matCellDef="let element">
                                    {{ element.responsible?.name }}
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="area">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                                    <span class="header-cell">Resultado</span>
                                </th>
                                <td mat-cell *matCellDef="let element">
                                    <span class="number-badge">{{ element.results }}</span>
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="actions">
                                <th mat-header-cell *matHeaderCellDef>
                                    <span class="header-cell">Acciones</span>
                                </th>
                                <td mat-cell *matCellDef="let element">
                                    <div class="action-buttons">
                                        <button mat-icon-button [matMenuTriggerFor]="menu" class="action-button">
                                            <mat-icon>more_vert</mat-icon>
                                        </button>
                                        <mat-menu #menu="matMenu" class="custom-menu">
                                            <button (click)="showDetails(element.id)" mat-menu-item class="menu-item">
                                                <mat-icon class="text-primary">visibility</mat-icon>
                                                <span>Ver Detalles</span>
                                            </button>
                                            <button (click)="download(element.id)" mat-menu-item class="menu-item">
                                                <mat-icon class="text-primary">cloud_download</mat-icon>
                                                <span>Descargar PDF</span>
                                            </button>
                                            <button (click)="destroy(element.id)" mat-menu-item class="menu-item">
                                                <mat-icon class="text-danger">delete</mat-icon>
                                                <span>Eliminar</span>
                                            </button>
                                        </mat-menu>
                                    </div>
                                </td>
                            </ng-container>

                            <tr mat-header-row *matHeaderRowDef="displayedColumns" class="header-row"></tr>
                            <tr mat-row *matRowDef="let row; columns: displayedColumns" class="data-row"></tr>
                        </table>
                    </div>
                </ng-container>

                <ng-container *ngIf="pagination.isLoading">
                    <div class="table-loading-records">
                        <mat-spinner diameter="40"></mat-spinner>
                        <div class="table-loading-records__title">Cargando evaluaciones...</div>
                    </div>
                </ng-container>

                <ng-container *ngIf="!pagination.isLoading && patients.length == 0">
                    <div class="table-no-records">
                        <mat-icon class="icon-40">assignment</mat-icon>
                        <div class="table-no-records__title">No se encontraron evaluaciones</div>
                    </div>
                </ng-container>

                <mat-paginator
                    class="custom-paginator"
                    [ngClass]="{ 'hidden': patients.length == 0 }"
                    [length]="pagination.total"
                    [pageIndex]="pagination.pageIndex"
                    [pageSize]="pagination.perPage"
                    [pageSizeOptions]="[50, 80, 100]"
                    [showFirstLastButtons]="true">
                </mat-paginator>
            </ng-container>
        </mat-card>
    </div>
</div>
