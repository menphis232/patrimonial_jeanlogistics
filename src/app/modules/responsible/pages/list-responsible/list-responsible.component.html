<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="row justify-content-between align-items-center mb-4">
      <div class="col-sm-6">
        <app-search-field [pagination]="pagination" class="search-field-custom"></app-search-field>
      </div>
      <div class="col-sm-6 text-end">
        <button mat-raised-button color="primary" class="action-button" (click)="create()">
          Agregar
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<mat-card class="cardWithShadow table-container">
  <ng-container *ngIf="(responsibles$ | async) as responsibles">

    <ng-container *ngIf="responsibles.length > 0">
      <div class="table-responsive custom-table">
        <table mat-table [dataSource]="responsibles" matSort class="w-100">

          <!-- Nombre -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              <span class="header-cell">Nombre</span>
            </th>
            <td mat-cell *matCellDef="let element">{{ element.name }}</td>
          </ng-container>

          <!-- Correo -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              <span class="header-cell">Correo Electrónico</span>
            </th>
            <td mat-cell *matCellDef="let element">{{ element.email }}</td>
          </ng-container>

          <!-- Teléfono -->
          <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              <span class="header-cell">Teléfono</span>
            </th>
            <td mat-cell *matCellDef="let element">{{ element.phone }}</td>
          </ng-container>

          <!-- Centro de trabajo -->
          <ng-container matColumnDef="farm">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              <span class="header-cell">Centro de trabajo</span>
            </th>
            <td mat-cell *matCellDef="let element">{{ element.farm?.name || 'No asignado' }}</td>
          </ng-container>

          <!-- Acciones -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>
              <span class="header-cell">Acciones</span>
            </th>
            <td mat-cell *matCellDef="let element">
              <div class="action-buttons">
                <button mat-icon-button [matMenuTriggerFor]="menu" class="action-button">
                  <mat-icon class="text-muted">more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu" class="custom-menu">
                  <button mat-menu-item class="menu-item" (click)="edit(element.id)">
                    <mat-icon class="text-info">edit</mat-icon>
                    <span>Editar</span>
                  </button>
                  <button mat-menu-item class="menu-item text-danger" (click)="destroy(element.id)">
                    <mat-icon class="text-danger">delete</mat-icon>
                    <span>Eliminar</span>
                  </button>
                </mat-menu>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns" class="header-row"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns" class="data-row"></tr>
        </table>
      </div>
    </ng-container>

    <ng-container *ngIf="pagination.isLoading">
      <div class="table-loading-records">
        <i-tabler name="search" class="icon-40"></i-tabler>
        <div class="table-loading-records__title">Cargando Responsables...</div>
      </div>
    </ng-container>

    <ng-container *ngIf="!pagination.isLoading && responsibles.length == 0">
      <div class="table-no-records">
        <i-tabler name="users" class="icon-40"></i-tabler>
        <div class="table-no-records__tilte">No se encontraron responsables</div>
      </div>
    </ng-container>

    <mat-paginator
      class="custom-paginator"
      [ngClass]="{ hidden: responsibles.length == 0 }"
      [length]="pagination.total"
      [pageIndex]="pagination.pageIndex"
      [pageSize]="pagination.perPage"
      [pageSizeOptions]="[50, 80, 100]"
      [showFirstLastButtons]="true">
    </mat-paginator>

  </ng-container>
</mat-card>
