<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow">
      <mat-card-content>
        <div class="toolbar-controls">
          <div class="toolbar-controls__control">
            <app-search-field [pagination]="pagination" class="search-field-custom"></app-search-field>
          </div>

          <form [formGroup]="form" #projectNgForm="ngForm" class="toolbar-controls__filters">
            <!-- Filtro: Centro de trabajo -->
            <div class="toolbar-controls__control">
              <app-c-async-select
                formControlName="farm"
                methodService="costCenters"
                bindLabel="name"
                bindValue="id"
                class="toolbar-controls__select">
              </app-c-async-select>
            </div>

            <!-- Filtro: Tipo de área -->
            <div class="toolbar-controls__control">
              <mat-form-field appearance="outline" class="toolbar-controls__mat-field hide-hint">
                <mat-label>Tipo de área</mat-label>
                <mat-select formControlName="areaTypeId">
                  <mat-option [value]="null">Todas</mat-option>
                  <mat-option *ngFor="let type of areaTypes" [value]="type.id">
                    {{ type.description }}
                  </mat-option>
                </mat-select>
              </mat-form-field>
            </div>
          </form>

          <!-- Acciones -->
          <div class="toolbar-controls__actions">
            <button mat-flat-button color="primary" [routerLink]="['../add']" *ngIf="!isGlobal">
              <mat-icon>add</mat-icon>
              Agregar área
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="cardWithShadow table-container">
      <ng-container *ngIf="(categories$ | async) as patients">

        <ng-container *ngIf="patients.length > 0">
          <div class="table-responsive custom-table">
            <table mat-table [dataSource]="patients" matSort class="w-100">

              <!-- Columna: Código -->
              <ng-container matColumnDef="code">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                  <span class="header-cell">Código</span>
                </th>
                <td mat-cell *matCellDef="let element">
                  <span class="badge bg-light-primary text-primary"
                        [matTooltip]="element.code ? '' : 'No posee código asignado'"
                        matTooltipPosition="above">
                    {{ element.code || 'N/P' }}
                  </span>
                </td>
              </ng-container>

              <!-- Columna: Nombre del área -->
              <ng-container matColumnDef="farm">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                  <span class="header-cell">Nombre del área</span>
                </th>
                <td mat-cell *matCellDef="let element">
                  <strong>{{ element.name }}</strong>
                </td>
              </ng-container>

              <!-- Columna: ¿Es controlada? -->
              <ng-container matColumnDef="is_controlled">
                <th mat-header-cell *matHeaderCellDef>
                  <span class="header-cell">Área de Control</span>
                </th>
                <td mat-cell *matCellDef="let element">
                  <span [matTooltip]="element.is_controlled ? 'Área de control' : 'No es área de control'"
                        matTooltipPosition="above"
                        class="badge"
                        [ngClass]="element.is_controlled ? 'bg-light-primary text-primary' : 'bg-light-info text-info'">
                    {{ element.is_controlled ? 'Sí' : 'No' }}
                  </span>
                </td>
              </ng-container>

              <!-- Columna: Tipo de área -->
              <ng-container matColumnDef="area_type">
                <th mat-header-cell *matHeaderCellDef>
                  <span class="header-cell">Tipo de Área</span>
                </th>
                <td mat-cell *matCellDef="let element">
                  {{ element.area_type?.description || 'N/P' }}
                </td>
              </ng-container>

              <!-- Columna: Acciones -->
              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>
                  <span class="header-cell">Acciones</span>
                </th>
                <td mat-cell *matCellDef="let element">
                  <div class="action-buttons">
                    <button mat-icon-button [matMenuTriggerFor]="menu" class="action-button">
                      <mat-icon>more_vert</mat-icon>
                    </button>
                    <mat-menu #menu="matMenu" class="custom-menu">
                      <button [routerLink]="['../edit', element.id]" mat-menu-item class="menu-item" *ngIf="!isGlobal">
                        <mat-icon class="text-primary">edit</mat-icon>
                        <span>Editar</span>
                      </button>
                      <button (click)="openDialog(element.id)" mat-menu-item class="menu-item">
                        <mat-icon class="text-info">settings_overscan</mat-icon>
                        <span>QR</span>
                      </button>
                      <button (click)="destroy(element.id)" mat-menu-item class="menu-item">
                        <mat-icon class="text-danger">delete</mat-icon>
                        <span>Eliminar</span>
                      </button>
                    </mat-menu>
                  </div>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns" class="header-row"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns" class="data-row"></tr>
            </table>
          </div>
        </ng-container>

        <ng-container *ngIf="pagination.isLoading">
          <div class="table-loading-records">
            <mat-spinner diameter="40"></mat-spinner>
            <div class="table-loading-records__title">Cargando áreas... </div>
          </div>
        </ng-container>

        <ng-container *ngIf="!pagination.isLoading && patients.length == 0">
          <div class="table-no-records">
            <mat-icon class="icon-40">category</mat-icon>
            <div class="table-no-records__title"> No se encontraron áreas </div>
          </div>
        </ng-container>

        <mat-paginator
          class="custom-paginator"
          [ngClass]="{ 'hidden': patients.length == 0 }"
          [length]="pagination.total"
          [pageIndex]="pagination.pageIndex"
          [pageSize]="pagination.perPage"
          [pageSizeOptions]="[6, 12, 24, 50]"
          [showFirstLastButtons]="true">
        </mat-paginator>

      </ng-container>
    </mat-card>
  </div>
</div>
