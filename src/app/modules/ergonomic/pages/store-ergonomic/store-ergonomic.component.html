<div class="row">
    <div class="col-lg-12">
        <mat-card class="cardWithShadow theme-card">
            <mat-card-content class="b-t-1">
                <form [formGroup]="form" #projectNgForm="ngForm">
                    <div class="row">

              
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Centro de trabajo</mat-label>
                            <app-c-async-select formControlName="farm" methodService="costCenters"
                                bindLabel="name" bindValue="id">
                            </app-c-async-select>
                            <mat-error errorSpan controlName="farm"></mat-error>
                        </div>

                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Código</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="code" matInput placeholder="" />
                                <mat-error errorSpan controlName="code"></mat-error>
                            </mat-form-field>
                        </div>

                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Nombre</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="name" matInput placeholder="" />
                                <mat-error errorSpan controlName="name"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Descripción</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="description" matInput placeholder="" />
                                <mat-error errorSpan controlName="description"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Metros</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="area_meters" matInput placeholder="" />
                                <mat-error errorSpan controlName="area_meters"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Personas</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="persons" matInput placeholder="" />
                                <mat-error errorSpan controlName="persons"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Actividades</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="activities" matInput placeholder="" />
                                <mat-error errorSpan controlName="activities"></mat-error>
                            </mat-form-field>
                        </div>

                         <!-- Sustancias Peligrosas -->
                         <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Sustancias Peligrosas</mat-label>
                            <mat-checkbox formControlName="dangerous_sustances">¿Contiene sustancias peligrosas?</mat-checkbox>
                            <mat-error errorSpan controlName="dangerous_sustances"></mat-error>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Áreas compartidas</mat-label>
                            <app-c-async-select formControlName="shared_areas" [multiple]="true"  methodService="areas"
                                bindLabel="name" bindValue="id">
                            </app-c-async-select>
                            <mat-error errorSpan controlName="shared_areas"></mat-error>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Horario de trabajo</mat-label>
                            <app-c-async-select formControlName="work_schedule" methodService="workSchedule"
                            bindLabel="description" bindValue="id">
                            </app-c-async-select>
                            <mat-error errorSpan controlName="work_schedule"></mat-error>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Descripción del horario de trabajo</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="work_schedule_description" matInput placeholder="" />
                                <mat-error errorSpan controlName="work_schedule_description"></mat-error>
                            </mat-form-field>
                        </div>
                         <!-- Files -->
                    <div class="col-sm-12 col-md-12">
                        <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Archivos</mat-label>
                        
                        <!-- Mostrar archivos existentes -->
                        <div class="existing-files mb-3" *ngIf="form.get('files').value?.length > 0">
                            <div class="row">
                                <div class="col-md-4 mb-2" *ngFor="let file of form.get('files').value">
                                    <div class="file-item p-2 border rounded d-flex justify-content-between align-items-center">
                                        <div class="file-info">
                                            <a [href]="file.url" target="_blank" *ngIf="isExistingFile(file)">
                                                {{ file.name || 'Archivo' }}
                                            </a>
                                            <span *ngIf="!isExistingFile(file)">
                                                {{ file.name || 'Nuevo archivo' }}
                                            </span>
                                        </div>
                                        <button mat-icon-button color="warn" (click)="removeFile(file)">
                                            <mat-icon>delete</mat-icon>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Dropzone para nuevos archivos -->
                        <app-dropzone
                            [deleteOnlyLocal]="true"
                            class="w-100"
                            formControlName="files"
                            (filesAdded)="onFilesChanged($event)"
                            (filesRemoved)="removeFile($event)">
                        </app-dropzone>
                    </div>

                    </div>
                    <div class="d-flex justify-content-end">
                        
                        <button mat-flat-button color="primary" (click)="save()">
                            <div class="d-flex align-items-center">
                                <i-tabler 
                                name="device-floppy" 
                                class="icon-18 m-r-4"></i-tabler>
                                <span>Guardar</span>
                            </div>
                        </button>
                      
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
