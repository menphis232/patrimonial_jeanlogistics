
<mat-card class="cardWithShadow">
    <mat-card-content>
        <div class="row justify-content-between">
            <div class="col-sm-4">
                <app-search-field [pagination]="pagination"></app-search-field>
            </div>
            <div *ngIf="!isGlobal" class="col-sm-4 d-flex align-items-center justify-content-end">
                <a mat-button [routerLink]="['../add']" mat-flat-button color="primary">Agregar area</a>
            </div>
        </div>
    </mat-card-content>
</mat-card>

<mat-card class="cardWithShadow">
    <ng-container *ngIf="(areas$ | async) as areas">
        <ng-container *ngIf="areas.length > 0;">

            <div class="row">
                <ng-container *ngFor="let element of areas;">
                    <div class="col-sm-1 col-md-4 m-b-10">
                        <mat-card-content class="text-center p-24">
                            <div class="d-flex justify-content-center">
                                <div class="logo-icon bg-primary">
                                    <i-tabler name="building-community" class="icon-40 text-white"></i-tabler>
                                </div>
                            </div>
                            <h4 mat-card-title class="card-title m-t-16 m-b-0">
                              {{ element.name }}
                            </h4>
                            <h4 mat-card-title class="card-title m-b-0">
                                {{ element.code }}
                            </h4>
                            <div class="d-flex justify-content-center gap-16 flex-wrap">
                                <span class="f-s-12">
                                    <span class="f-w-600">fecha de creación: </span>
                                    {{ element.created_at | date: 'dd/MM/yy' }}
                                </span>
                             
                            </div>

                            <div class="m-t-20">
                                <a
                                    [routerLink]="['../edit', element.id]"
                                    mat-flat-button 
                                    class="m-r-8" 
                                    color="primary">Editar</a>
                                <button 
                                    (click)="destroy(element.id)"
                                    mat-flat-button 
                                    color="warn">Eliminar</button>
                            </div>
                          </mat-card-content>
                    </div>
                </ng-container>
            </div>
        </ng-container>

        <ng-container *ngIf="pagination.isLoading">
            <div
                class="table-loading-records">
                <i-tabler name="search" class="icon-40"></i-tabler>
                <div class="table-loading-records__title">Cargando areas...
                </div>
            </div>
        </ng-container>
    
        <ng-container *ngIf="!pagination.isLoading && areas.length == 0">
            <div
                class="table-no-records">
                <i-tabler name="building-community" class="icon-40"></i-tabler>
                <div class="table-no-records__tilte">
                    No se encontraron areas registrados
                </div>
            </div>
        </ng-container>

        <mat-paginator 
            [ngClass]="{ 'hidden': areas.length == 0 }"
            [length]="pagination.total"
            [pageIndex]="pagination.pageIndex" 
            [pageSize]="pagination.perPage" 
            [pageSizeOptions]="[50, 80, 100 ]"
            [showFirstLastButtons]="true">
        </mat-paginator>

    </ng-container>
 
</mat-card>
