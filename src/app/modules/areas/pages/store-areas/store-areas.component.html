<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow theme-card">
      <mat-card-content class="b-t-1">
        <form [formGroup]="form" #projectNgForm="ngForm">
          <div class="row">
            <div class="col-sm-1 col-md-6">
              <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Nombre *</mat-label>
              <mat-form-field appearance="outline" class="w-100">
                <input matInput formControlName="name" placeholder="">
                <mat-error errorSpan controlName="name"></mat-error>
              </mat-form-field>
            </div>
            
            <div class="col-sm-1 col-md-6">
              <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Código *</mat-label>
              <mat-form-field appearance="outline" class="w-100">
                <input matInput formControlName="code" placeholder="">
                <mat-error errorSpan controlName="code"></mat-error>
              </mat-form-field>
            </div>
            
            <div class="col-sm-1 col-md-6">
              <div class="w-100">
                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Tipo CEDIS *</mat-label>
                <app-c-async-select class="w-full" formControlName="cost_center_type" methodService="typeCostCenters" bindLabel="name" bindValue="id"></app-c-async-select>
                <mat-error errorSpan controlName="cost_center_type"></mat-error>
              </div>
            </div>
            
            <div class="col-sm-1 col-md-6">
              <div class="w-100">
                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">CEDIS *</mat-label>
                <app-c-async-select class="w-full" formControlName="cost_center" methodService="costCenters" bindLabel="name" bindValue="id"></app-c-async-select>
                <mat-error errorSpan controlName="cost_center"></mat-error>
              </div>
            </div>
            
            <div class="d-flex justify-content-end">
              <button mat-flat-button color="primary" (click)="save()">
                <div class="d-flex align-items-center">
                  <i-tabler name="device-floppy" class="icon-18 m-r-4"></i-tabler>
                  <span>Guardar</span>
                </div>
              </button>
            </div>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
