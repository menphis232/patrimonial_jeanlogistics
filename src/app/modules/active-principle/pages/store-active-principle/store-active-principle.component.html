<div class="row">
    <div class="col-lg-12">
        <mat-card class="cardWithShadow theme-card">
            <mat-card-content class="b-t-1">
                <form [formGroup]="form" #projectNgForm="ngForm">
                    <div class="row">

                        <div class="col-sm-12">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Nombre</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="name" matInput placeholder="nombre principio activo" />
                                <mat-error errorSpan controlName="name"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-12 m-t-10">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Descripción</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="description" matInput placeholder="Descripción" />
                                <mat-error errorSpan controlName="description"></mat-error>
                            </mat-form-field>
                        </div>

                    </div>
                    <div class="d-flex justify-content-end">
                        
                        <button mat-flat-button color="primary" (click)="save()">
                            <div class="d-flex align-items-center">
                                <i-tabler 
                                name="device-floppy" 
                                class="icon-18 m-r-4"></i-tabler>
                                <span>Guardar</span>
                            </div>
                        </button>
                      
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
