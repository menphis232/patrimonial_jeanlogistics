<mat-card class="cardWithShadow">
    <mat-card-content>
        <div class="row justify-content-between align-items-center mb-4">
            <div class="col-sm-4">
                <app-search-field [pagination]="pagination" class="search-field-custom"></app-search-field>
            </div>
            <div class="col-sm-4 text-end">
                <button mat-flat-button color="primary" [routerLink]="['../add']">
                    <mat-icon>add</mat-icon>
                    Agregar guardias de seguridad
                </button>
            </div>
        </div>
    </mat-card-content>
</mat-card>

<mat-card class="cardWithShadow table-container">
    <ng-container *ngIf="(categories$ | async) as patients">
        <ng-container *ngIf="patients.length > 0;">
            <div class="table-responsive custom-table">
                <table mat-table [dataSource]="patients" matSort class="w-100">
                    <!-- Código -->
                    <ng-container matColumnDef="code">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>
                            <span class="header-cell">Código</span>
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <span class="badge bg-light-primary text-primary">{{ element.code }}</span>
                        </td>
                    </ng-container>

                    <!-- Centro de trabajo -->
                    <ng-container matColumnDef="farm">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>
                            <span class="header-cell">Centro de trabajo</span>
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <strong>{{ element.farm?.name }}</strong>
                        </td>
                    </ng-container>

                    <!-- Nombre y Apellido -->
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>
                            <span class="header-cell">Nombre y Apellido</span>
                        </th>
                        <td mat-cell *matCellDef="let element">
                            {{ element.first_name + ' ' + element.last_name }}
                        </td>
                    </ng-container>

                    <!-- Turno -->
                    <ng-container matColumnDef="turn">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>
                            <span class="header-cell">Turno</span>
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <span class="badge bg-light-primary text-primary">{{ element.turn?.description | titlecase }}</span>
                        </td>
                    </ng-container>

                    <!-- Acciones -->
                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef>
                            <span class="header-cell">Acciones</span>
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <div class="action-buttons">
                                <button mat-icon-button [matMenuTriggerFor]="menu" class="action-button">
                                    <mat-icon>more_vert</mat-icon>
                                </button>
                                <mat-menu #menu="matMenu" class="custom-menu">
                                    <button [routerLink]="['../edit', element.id]" mat-menu-item class="menu-item">
                                        <mat-icon class="text-primary">edit</mat-icon>
                                        <span>Editar</span>
                                    </button>
                                    <button (click)="openDialog(element.id,element.qr)" mat-menu-item class="menu-item">
                                        <mat-icon class="text-info">settings_overscan</mat-icon>
                                        <span>QR</span>
                                    </button>
                                    <button (click)="destroy(element.id)" mat-menu-item class="menu-item">
                                        <mat-icon class="text-danger">delete</mat-icon>
                                        <span>Eliminar</span>
                                    </button>
                                </mat-menu>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns" class="header-row"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns" class="data-row"></tr>
                </table>
            </div>
        </ng-container>

        <!-- Estados de carga y sin registros -->
        <ng-container *ngIf="pagination.isLoading">
            <div class="table-loading-records">
                <mat-spinner diameter="40"></mat-spinner>
                <div class="table-loading-records__title">Cargando guardias de seguridad...</div>
            </div>
        </ng-container>

        <ng-container *ngIf="!pagination.isLoading && patients.length == 0">
            <div class="table-no-records">
                <mat-icon class="icon-40">person_off</mat-icon>
                <div class="table-no-records__title">No se encontraron guardias de seguridad</div>
            </div>
        </ng-container>

        <mat-paginator 
            class="custom-paginator"
            [ngClass]="{ 'hidden': patients.length == 0 }"
            [length]="pagination.total"
            [pageIndex]="pagination.pageIndex" 
            [pageSize]="pagination.perPage" 
            [pageSizeOptions]="[50, 80, 100]"
            [showFirstLastButtons]="true">
        </mat-paginator>
    </ng-container>
</mat-card>
