<div class="row">
    <div class="col-lg-12">
        <mat-card class="cardWithShadow theme-card">
            <mat-card-content class="b-t-1">
                <form [formGroup]="form" #projectNgForm="ngForm">
                    <div class="row">

                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Turno</mat-label>
                            <app-c-async-select formControlName="turn" methodService="turns"
                                bindLabel="description" bindValue="id">
                            </app-c-async-select>
                            <mat-error errorSpan controlName="turn"></mat-error>
                        </div>

                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Centro de trabajo</mat-label>
                            <app-c-async-select formControlName="farm" methodService="costCenters"
                                bindLabel="name" bindValue="id">
                            </app-c-async-select>
                            <mat-error errorSpan controlName="farm"></mat-error>
                        </div>

                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Código</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="code" matInput placeholder="" />
                                <mat-error errorSpan controlName="code"></mat-error>
                            </mat-form-field>
                        </div>

                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Nombre</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="first_name" matInput placeholder="" />
                                <mat-error errorSpan controlName="first_name"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Apellido</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="last_name" matInput placeholder="" />
                                <mat-error errorSpan controlName="last_name"></mat-error>
                            </mat-form-field>
                        </div>


                    </div>
                    <div class="d-flex justify-content-end">
                        
                        <button mat-flat-button color="primary" (click)="save()">
                            <div class="d-flex align-items-center">
                                <i-tabler 
                                name="device-floppy" 
                                class="icon-18 m-r-4"></i-tabler>
                                <span>Guardar</span>
                            </div>
                        </button>
                      
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
