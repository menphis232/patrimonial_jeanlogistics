<div class="row">
    <div class="col-lg-12">
        <mat-card class="cardWithShadow theme-card">
            <mat-card-content class="b-t-1">
                <form [formGroup]="form" #projectNgForm="ngForm">
                    <div class="row">

                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Fecha de inicio</mat-label>
                            
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="start" matInput [matDatepicker]="start">
                                <!-- <mat-hint>MM/DD/YYYY</mat-hint> -->
                                <mat-datepicker-toggle matIconSuffix [for]="start"></mat-datepicker-toggle>
                                <mat-datepicker #start></mat-datepicker>
                            </mat-form-field>
                           
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Fecha de fin</mat-label>
                            
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="end" matInput [matDatepicker]="end">
                                <!-- <mat-hint>MM/DD/YYYY</mat-hint> -->
                                <mat-datepicker-toggle matIconSuffix [for]="end"></mat-datepicker-toggle>
                                <mat-datepicker #end></mat-datepicker>
                            </mat-form-field>
                           
                        </div>

                        <div class="col-sm-1 col-md-4  m-t-10">
                            <div class="w-100">
                                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Categoria del cambio de operación</mat-label>
                                <app-c-async-select 
                                    class="w-full" 
                                    formControlName="operation_change_category" 
                                    methodService="categoryChangeOperation"
                                    bindLabel="description" 
                                    bindValue="id">
                                </app-c-async-select>
                                <mat-error errorSpan controlName="operation_change_category"></mat-error>
                            </div>
                        </div>

                        
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Tipo de centro de costo</mat-label>
                            <app-c-async-select formControlName="cost_center_type" methodService="typeCostCenters"
                                bindLabel="name" bindValue="id">
                            </app-c-async-select>
                            <mat-error errorSpan controlName="cost_center_type"></mat-error>
                        </div>
                        <div class="col-sm-12 col-md-4">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Centro de costo</mat-label>
                            <app-c-async-select formControlName="cost_center" methodService="costCenters"
                                bindLabel="name" bindValue="id">
                            </app-c-async-select>
                            <mat-error errorSpan controlName="cost_center"></mat-error>
                        </div>

                        <div class="col-sm-1 col-md-4  m-t-10">
                            <div class="w-100">
                                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Espacio de trabajo (origen)</mat-label>
                                <app-c-async-select 
                                    class="w-full" 
                                    formControlName="work_space_origin" 
                                    methodService="workSpace"
                                    bindLabel="name" 
                                    bindValue="id">
                                </app-c-async-select>
                                <mat-error errorSpan controlName="work_space_origin"></mat-error>
                            </div>
                        </div>
                        <div class="col-sm-1 col-md-4  m-t-10">
                            <div class="w-100">
                                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Espacio de trabajo (destino)</mat-label>
                                <app-c-async-select 
                                    class="w-full" 
                                    formControlName="work_space_destination" 
                                    methodService="workSpace"
                                    bindLabel="name" 
                                    bindValue="id">
                                </app-c-async-select>
                                <mat-error errorSpan controlName="work_space_destination"></mat-error>
                            </div>
                        </div>
                        <div class="col-sm-1 col-md-4  m-t-10">
                            <div class="w-100">
                                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Área del centro de costo (origen)</mat-label>
                                <app-c-async-select 
                                    class="w-full" 
                                    formControlName="origin_cost_center_area" 
                                    methodService="areaCostCenters"
                                    bindLabel="name" 
                                    bindValue="id">
                                </app-c-async-select>
                                <mat-error errorSpan controlName="origin_cost_center_area"></mat-error>
                            </div>
                        </div>
                        <div class="col-sm-1 col-md-4  m-t-10">
                            <div class="w-100">
                                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Área del centro de costo (destino)</mat-label>
                                <app-c-async-select 
                                    class="w-full" 
                                    formControlName="destination_cost_center_area" 
                                    methodService="areaCostCenters"
                                    bindLabel="name" 
                                    bindValue="id">
                                </app-c-async-select>
                                <mat-error errorSpan controlName="destination_cost_center_area"></mat-error>
                            </div>
                        </div>
                  
                        <div class="col-sm-1 col-md-4 m-t-10">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Antiguedad</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="antiquity_in_operation" matInput placeholder="" />
                                <mat-error errorSpan controlName="antiquity_in_operation"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-1 col-md-4 m-t-10">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Motivo</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="reason" matInput placeholder="" />
                                <mat-error errorSpan controlName="reason"></mat-error>
                            </mat-form-field>
                        </div>
                        <div class="col-sm-1 col-md-4 m-t-10">
                            <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Restrición</mat-label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input formControlName="restrictions" matInput placeholder="" />
                                <mat-error errorSpan controlName="restrictions"></mat-error>
                            </mat-form-field>
                        </div>

                    </div>
                    <div class="d-flex justify-content-end">
                        
                        <button mat-flat-button color="primary" (click)="save()">
                            <div class="d-flex align-items-center">
                                <i-tabler 
                                name="device-floppy" 
                                class="icon-18 m-r-4"></i-tabler>
                                <span>Guardar</span>
                            </div>
                        </button>
                      
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
