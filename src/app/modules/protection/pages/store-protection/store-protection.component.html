<div class="row">
    <div class="col-lg-12">
        <mat-card class="cardWithShadow theme-card">
            <mat-card-content class="b-t-1">
                <form [formGroup]="form" #projectNgForm="ngForm">
                    <div class="row">

                        <div class="col-sm-12 m-t-10">
                            <div class="w-100">
                                <mat-label class="mat-subtitle-2 f-w-600 d-block m-b-16">Concepto</mat-label>
                                <app-c-async-select 
                                    class="w-full" 
                                    formControlName="stock_movement_concept" 
                                    methodService="stockMovementConcepts"
                                    bindLabel="name" 
                                    bindValue="id">
                                </app-c-async-select>
                                <mat-error errorSpan controlName="stock_movement_concept"></mat-error>
                            </div>
                        </div>


                        <div class="col-sm-12 m-t-20">

                            <ng-container formArrayName="stock_movement_details">
                                <div class="list">
                                    <ng-container *ngFor="let element of stockMovementDetails.controls; let i = index" [formGroupName]="i">
                            
                                        <div class="list__item">
                                            <div class="list__container">

                                                <div class="w-100">
                                                    <app-c-async-select 
                                                        class="w-full" 
                                                        formControlName="stock_id" 
                                                        methodService="stocks"
                                                        bindLabel="description_stock" 
                                                        bindValue="id">
                                                    </app-c-async-select>
                                                    <mat-error errorSpan controlName="stock_id"></mat-error>
                                                </div>
                                                <div class="d-flex align-items-center gap-16">

                                                    <mat-form-field appearance="outline" class="w-100">
                                                        <mat-label class="mat-subtitle-2">Cantidad</mat-label>
                                                        <input formControlName="quantity" matInput placeholder="" />
                                                        <mat-error errorSpan controlName="quantity"></mat-error>
                                                    </mat-form-field>
            
                                                    <i-tabler name="trash" class="text-error cursor-pointer" (click)="removeMovementDetail(i)"></i-tabler>
                                                </div>
                                               
                                            </div>
                                        </div>
                            
                                    </ng-container>
                            
                            
                                    <div class="list__add" (click)="addMovementDetail()">
                                        <div class="d-flex flex-column text-primary align-items-center">
                                            <i-tabler name="brand-stackoverflow" class="text-primary"></i-tabler>
                                            Añadir detalle
                                        </div>
                                    </div>
                                </div>
                            </ng-container>
                         
                        </div>
                       
                    </div>
                    <div class="d-flex justify-content-end m-t-20">
                        
                        <button mat-flat-button color="primary" (click)="save()">
                            <div class="d-flex align-items-center">
                                <i-tabler 
                                name="device-floppy" 
                                class="icon-18 m-r-4"></i-tabler>
                                <span>Guardar</span>
                            </div>
                        </button>
                      
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
